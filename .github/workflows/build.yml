name: Build Patalix OS for Violet (Ultra Clean Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -a -f

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev
          sudo apt-get install -y libncurses5 lib32ncurses5-dev || true

      - name: Sync Source
        run: |
          mkdir build && cd build
          repo init -u https://github.com/DerpFest-AOSP/manifest.git -b 15 --git-lfs --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Patalix OS Branding
        run: |
          cd build
          grep -rl 'DerpFest' . | xargs sed -i 's/DerpFest/Patalix OS/g' || true
          echo "PRODUCT_NAME := Patalix OS" >> vendor/derp/config/common.mk
          echo "TARGET_INCLUDE_PIXEL_AI_FEATURES := true" >> vendor/derp/config/common.mk

      - name: Generate Bootanimation
        run: |
          cd build
          mkdir -p patalix_boot/part0
          convert -size 1080x2340 xc:black -gravity center -pointsize 80 -fill white -draw "text 0,0 'Patalix OS'" patalix_boot/part0/00001.png
          echo "1080 2340 30" > patalix_boot/desc.txt
          echo "p 1 0 part0" >> patalix_boot/desc.txt
          cd patalix_boot && zip -0r ../bootanimation.zip . && cd ..
          cp bootanimation.zip vendor/derp/prebuilt/common/bootanimation/bootanimation.zip

      - name: Sync Device Sources
        run: |
          cd build
          git clone https://github.com/DerpFest-Devices/device_xiaomi_violet.git -b 15 --depth=1 device/xiaomi/violet
          git clone https://github.com/DerpFest-Devices/kernel_xiaomi_violet.git -b 15 --depth=1 kernel/xiaomi/violet
          git clone https://github.com/DerpFest-Devices/vendor_xiaomi_violet.git -b 15 --depth=1 vendor/xiaomi

      - name: Build ROM
        run: |
          cd build
          export ALLOW_MISSING_DEPENDENCIES=true
          . build/envsetup.sh
          lunch derp_violet-userdebug
          mka derp -j$(nproc --all)

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Patalix-OS-Violet-Final
          path: build/out/target/product/violet/*.zip
